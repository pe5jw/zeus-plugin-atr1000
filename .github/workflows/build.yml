name: Build

on:
  push:
    branches: [main, develop]
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout zeus-plugin-atr1000
        uses: actions/checkout@v4

      # CI doesn't have Zeus installed, so we check out the source contracts.
      - name: Checkout openhpsdr-zeus (develop)
        uses: actions/checkout@v4
        with:
          repository: Kb2uka/openhpsdr-zeus
          ref: develop
          path: openhpsdr-zeus

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Build UI
        run: npm run build

      - name: Build backend (using source contracts)
        run: >
          dotnet build Atr1000.csproj -c Release
          /p:ZeusContractsProject=${{ github.workspace }}\openhpsdr-zeus\Zeus.Plugins.Contracts\Zeus.Plugins.Contracts.csproj

      - name: Assemble dist + zip
        shell: pwsh
        run: |
          $v    = (Get-Content plugin.json | ConvertFrom-Json).version
          $dist = "dist"
          New-Item $dist        -ItemType Directory | Out-Null
          New-Item "$dist\ui"   -ItemType Directory | Out-Null
          Copy-Item plugin.json                       $dist
          Copy-Item bin\Release\net10.0\Atr1000.dll   $dist
          Copy-Item ui\atr1000.es.js                  "$dist\ui\"
          $zip  = "atr1000-$v.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          Write-Host "ZIP : $zip"
          Write-Host "SHA : $hash"
          echo "ZIP_NAME=$zip"    >> $env:GITHUB_ENV
          echo "ZIP_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      # Only attach to a GitHub Release when a version tag (v*) is pushed.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          body: |
            SHA-256: `${{ env.ZIP_SHA256 }}`

            Paste this value into `registry-entry.json → versions[0].sha256`
            when submitting to the Openhpsdr-Zeus plugin registry.
