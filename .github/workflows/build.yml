name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Checkout openhpsdr-zeus (contracts only, sparse)
        uses: actions/checkout@v4
        with:
          repository: Kb2uka/openhpsdr-zeus
          ref: main
          path: openhpsdr-zeus
          sparse-checkout: |
            Zeus.Plugins.Contracts
            Zeus.Contracts
          sparse-checkout-cone-mode: false

      - name: Find Zeus.Plugins.Contracts csproj
        id: contracts
        run: |
          CSPROJ=$(find openhpsdr-zeus -name "*.csproj" | grep -i "plugin" | head -1)
          if [ -z "$CSPROJ" ]; then
            CSPROJ=$(find openhpsdr-zeus -name "*.csproj" | grep -i "contract" | head -1)
          fi
          if [ -z "$CSPROJ" ]; then
            echo "Available csproj files:"
            find openhpsdr-zeus -name "*.csproj"
            exit 1
          fi
          echo "Found: $CSPROJ"
          echo "path=$CSPROJ" >> $GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install UI dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Build plugin
        run: |
          dotnet build Atr1000.csproj \
            -c Release \
            /p:ZeusContractsProject=${{ steps.contracts.outputs.path }}

      - name: Publish plugin
        run: |
          dotnet publish Atr1000.csproj \
            -c Release \
            --no-build \
            -o dist \
            /p:ZeusContractsProject=${{ steps.contracts.outputs.path }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./plugin.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd dist
          zip -r ../atr1000-${{ steps.version.outputs.version }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atr1000-${{ steps.version.outputs.version }}
          path: atr1000-${{ steps.version.outputs.version }}.zip

      - name: Attach zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: atr1000-${{ steps.version.outputs.version }}.zip
